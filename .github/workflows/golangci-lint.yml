name: golangci-lint
on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          # Per https://github.com/golangci/golangci-lint/blob/main/go.mod
          # The minimum Go version must always be latest-1.
          go-version: 1.25 

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5
